<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GYRO RACER 3D</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#87CEEB; overflow:hidden; font-family: monospace; touch-action:none; }
  canvas { display:block; }
  #hud {
    position:fixed; top:0; left:0; right:0;
    display:flex; justify-content:space-between;
    padding:12px 16px; pointer-events:none; z-index:10;
  }
  .hp {
    background:rgba(0,0,0,0.6); border:3px solid #fff;
    padding:6px 12px; color:#fff; font-size:11px; font-weight:bold;
    letter-spacing:1px; box-shadow:3px 3px 0 #000;
  }
  .hp .v { font-size:20px; color:#FFD700; display:block; text-shadow:2px 2px 0 #000; }
  #gbar { position:fixed; bottom:60px; left:50%; transform:translateX(-50%);
    width:200px; text-align:center; z-index:10; pointer-events:none; }
  #gbar .l { color:#fff; font-size:10px; font-weight:bold; letter-spacing:2px;
    text-shadow:1px 1px 0 #000; margin-bottom:4px; }
  #gt { height:10px; background:rgba(0,0,0,0.4); border:2px solid #fff;
    box-shadow:2px 2px 0 #000; position:relative; }
  #gth { position:absolute; top:-4px; width:8px; height:18px;
    background:#FFD700; border:2px solid #000; left:50%;
    transform:translateX(-50%); transition:left 0.05s; }
  #overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.78);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:20; gap:14px; padding:20px; text-align:center;
  }
  #overlay h1 {
    font-size:clamp(30px,9vw,68px); color:#FFD700; font-weight:900; letter-spacing:6px;
    text-shadow:4px 4px 0 #000, 7px 7px 0 #8B4513; line-height:1.1;
  }
  #overlay p { color:#fff; font-size:12px; letter-spacing:2px; line-height:2.2;
    text-shadow:1px 1px 0 #000; max-width:280px; }
  .bb { background:#FFD700; color:#000; font-family:monospace; font-weight:900;
    font-size:clamp(12px,3vw,18px); letter-spacing:3px; border:4px solid #000;
    padding:14px 36px; cursor:pointer; box-shadow:4px 4px 0 #000; }
  .bb:active { transform:translate(2px,2px); box-shadow:2px 2px 0 #000; }
  #rb { position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
    z-index:10; background:#FF4444; color:#fff; font-family:monospace;
    font-weight:900; font-size:13px; letter-spacing:2px;
    border:3px solid #000; padding:9px 24px; cursor:pointer;
    box-shadow:3px 3px 0 #000; display:none; }
</style>
</head>
<body>
<div id="hud">
  <div class="hp">SPD<span class="v" id="spd">0</span></div>
  <div class="hp">SCORE<span class="v" id="sc">0</span></div>
  <div class="hp">LAP<span class="v" id="lp">0/3</span></div>
</div>
<div id="gbar">
  <div class="l">&#9668; GYRO STEER &#9658;</div>
  <div id="gt"><div id="gth"></div></div>
</div>
<button id="rb">&#8635; RESTART</button>
<div id="overlay">
  <h1>GYRO<br>RACER<br>3D</h1>
  <p>TILT LEFT/RIGHT TO STEER<br>AUTO-THROTTLE ON<br>PASS ALL GATES &bull; 3 LAPS</p>
  <button class="bb" id="sb">&#9658; START ENGINE</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const renderer = new THREE.WebGLRenderer({antialias:false});
renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
document.body.appendChild(renderer.domElement);
const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0x87CEEB,55,170);
const camera=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,0.1,300);
window.addEventListener('resize',()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});
const sun=new THREE.DirectionalLight(0xfffbe0,1.3);
sun.position.set(40,80,30); sun.castShadow=true; scene.add(sun);
scene.add(new THREE.AmbientLight(0xaaccff,0.7));

const N=64, RW=5.5, SLAB_Y=0;
function mkPts(){
  const p=[];
  for(let i=0;i<N;i++){
    const t=(i/N)*Math.PI*2;
    p.push(new THREE.Vector3(Math.cos(t)*45+Math.sin(t*2)*4,SLAB_Y,Math.sin(t)*30));
  }
  return p;
}
const TP=mkPts();

function buildRoad(){
  const pos=[],idx=[],nor=[]; let vi=0;
  const push=(x,y,z,nx,ny,nz)=>{pos.push(x,y,z);nor.push(nx,ny,nz);return vi++;};
  for(let i=0;i<N;i++){
    const p0=TP[i],p1=TP[(i+1)%N];
    const f=new THREE.Vector3().subVectors(p1,p0).normalize();
    const r=new THREE.Vector3(-f.z,0,f.x);
    const TH=0.45;
    const tl0=push(p0.x-r.x*RW,p0.y,p0.z-r.z*RW,0,1,0);
    const tr0=push(p0.x+r.x*RW,p0.y,p0.z+r.z*RW,0,1,0);
    const tl1=push(p1.x-r.x*RW,p1.y,p1.z-r.z*RW,0,1,0);
    const tr1=push(p1.x+r.x*RW,p1.y,p1.z+r.z*RW,0,1,0);
    idx.push(tl0,tr0,tl1,tr0,tr1,tl1);
    const bl0=push(p0.x-r.x*RW,p0.y-TH,p0.z-r.z*RW,0,-1,0);
    const br0=push(p0.x+r.x*RW,p0.y-TH,p0.z+r.z*RW,0,-1,0);
    const bl1=push(p1.x-r.x*RW,p1.y-TH,p1.z-r.z*RW,0,-1,0);
    const br1=push(p1.x+r.x*RW,p1.y-TH,p1.z+r.z*RW,0,-1,0);
    idx.push(bl1,br0,bl0,bl1,br1,br0);
    [[p0.x-r.x*RW,p0.z-r.z*RW,p1.x-r.x*RW,p1.z-r.z*RW,-r.x,0,-r.z,1],
     [p0.x+r.x*RW,p0.z+r.z*RW,p1.x+r.x*RW,p1.z+r.z*RW,r.x,0,r.z,-1]].forEach(([ax,az,bx,bz,nx,ny,nz,flip])=>{
      const s=vi;
      push(ax,p0.y,az,nx,ny,nz); push(ax,p0.y-TH,az,nx,ny,nz);
      push(bx,p1.y,bz,nx,ny,nz); push(bx,p1.y-TH,bz,nx,ny,nz);
      if(flip<0) idx.push(s,s+1,s+2,s+1,s+3,s+2);
      else       idx.push(s+2,s+1,s,s+2,s+3,s+1);
    });
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  geo.setAttribute('normal',new THREE.Float32BufferAttribute(nor,3));
  geo.setIndex(idx);
  const S=64, td=new Uint8Array(S*S*4);
  for(let y=0;y<S;y++) for(let x=0;x<S;x++){
    const c=((x>>3)^(y>>3))&1, v=c?75:55, i=(y*S+x)*4;
    td[i]=v;td[i+1]=v;td[i+2]=v;td[i+3]=255;
  }
  const tex=new THREE.DataTexture(td,S,S,THREE.RGBAFormat);
  tex.needsUpdate=true; tex.magFilter=tex.minFilter=THREE.NearestFilter;
  const m=new THREE.Mesh(geo,new THREE.MeshLambertMaterial({map:tex}));
  m.receiveShadow=true; return m;
}

function buildBarriers(){
  const g=new THREE.Group();
  const mR=new THREE.MeshLambertMaterial({color:0xFF2222});
  const mW=new THREE.MeshLambertMaterial({color:0xEEEEEE});
  const geo=new THREE.BoxGeometry(1.1,0.7,1.1);
  for(let i=0;i<N;i++){
    const p=TP[i],p1=TP[(i+1)%N];
    const f=new THREE.Vector3().subVectors(p1,p).normalize();
    const r=new THREE.Vector3(-f.z,0,f.x);
    const mat=(Math.floor(i/3)%2===0)?mR:mW;
    [-1,1].forEach(s=>{
      const m=new THREE.Mesh(geo,mat);
      m.position.set(p.x+r.x*s*(RW+0.35),p.y+0.15,p.z+r.z*s*(RW+0.35));
      m.castShadow=true; g.add(m);
    });
  }
  return g;
}

const GI=[0,8,16,24,32,40,48,56];
function buildGates(){
  const g=new THREE.Group();
  GI.forEach(i=>{
    const p=TP[i],p1=TP[(i+1)%N];
    const angle=Math.atan2(p1.z-p.z,p1.x-p.x);
    const mat=new THREE.MeshLambertMaterial({color:0x00FFAA,emissive:0x00FF88,emissiveIntensity:0.5});
    const m=new THREE.Mesh(new THREE.BoxGeometry(RW*2,1.6,0.3),mat);
    m.position.set(p.x,p.y+1.0,p.z); m.rotation.y=-angle;
    m.userData.idx=i; m.userData.passed=false; g.add(m);
  });
  return g;
}

function mkCloud(x,y,z){
  const g=new THREE.Group();
  const mat=new THREE.MeshLambertMaterial({color:0xFFFFFF});
  [[2.2,1.3,1.5,0,0,0],[1.6,1,1.1,2.1,0.4,0],[1.3,0.9,1,-1.8,0.3,0]].forEach(([w,h,d,ox,oy,oz])=>{
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
    m.position.set(ox,oy,oz); g.add(m);
  });
  g.position.set(x,y,z); return g;
}

function buildCar(){
  const g=new THREE.Group();
  const bM=new THREE.MeshLambertMaterial({color:0xFF4400});
  const rM=new THREE.MeshLambertMaterial({color:0xCC3300});
  const wM=new THREE.MeshLambertMaterial({color:0x111111});
  const glM=new THREE.MeshLambertMaterial({color:0x88CCFF,transparent:true,opacity:0.75});
  const hlM=new THREE.MeshLambertMaterial({color:0xFFFF88,emissive:0xFFFF00,emissiveIntensity:1});
  const tlM=new THREE.MeshLambertMaterial({color:0xFF2200,emissive:0xFF0000,emissiveIntensity:0.8});
  const body=new THREE.Mesh(new THREE.BoxGeometry(1.6,0.55,2.8),bM);
  body.position.y=0.35; body.castShadow=true; g.add(body);
  const roof=new THREE.Mesh(new THREE.BoxGeometry(1.3,0.44,1.4),rM);
  roof.position.set(0,0.84,-0.12); g.add(roof);
  const wind=new THREE.Mesh(new THREE.BoxGeometry(1.2,0.38,0.1),glM);
  wind.position.set(0,0.80,0.64); g.add(wind);
  [[-0.88,0,0.9],[0.88,0,0.9],[-0.88,0,-0.9],[0.88,0,-0.9]].forEach(([x,y,z])=>{
    const w=new THREE.Mesh(new THREE.BoxGeometry(0.36,0.48,0.48),wM);
    w.position.set(x,y+0.24,z); g.add(w);
  });
  [-0.52,0.52].forEach(x=>{
    const h=new THREE.Mesh(new THREE.BoxGeometry(0.26,0.17,0.1),hlM);
    h.position.set(x,0.37,1.45); g.add(h);
    const t=new THREE.Mesh(new THREE.BoxGeometry(0.26,0.17,0.1),tlM);
    t.position.set(x,0.37,-1.45); g.add(t);
  });
  return g;
}

let road,barriers,gateGroup,car3d;
function buildWorld(){
  while(scene.children.length) scene.remove(scene.children[0]);
  scene.add(sun); scene.add(new THREE.AmbientLight(0xaaccff,0.7));
  road=buildRoad(); scene.add(road);
  barriers=buildBarriers(); scene.add(barriers);
  gateGroup=buildGates(); scene.add(gateGroup);
  car3d=buildCar(); scene.add(car3d);
  [[-55,20,15],[45,24,-35],[5,22,55],[-35,18,-45],[60,16,8],[-10,26,-15]].forEach(([x,y,z])=>scene.add(mkCloud(x,y,z)));
  const hz=new THREE.Mesh(new THREE.PlaneGeometry(600,600),new THREE.MeshBasicMaterial({color:0xADD8E6,transparent:true,opacity:0.25}));
  hz.rotation.x=-Math.PI/2; hz.position.y=-50; scene.add(hz);
}

const MAX_SPD=0.22, ACCEL=0.009, FRIC=0.975, TURN=0.034;
const st={running:false,x:0,z:0,angle:0,speed:0,steer:0,score:0,laps:0,ni:0,gp:new Set(),flash:0};

const keys={};
window.addEventListener('keydown',e=>{keys[e.key]=true;});
window.addEventListener('keyup',e=>{keys[e.key]=false;});

let gyroAvail=false, gyroVal=0;
function onOri(e){
  if(e.gamma===null) return;
  gyroAvail=true;
  // gamma negative = tilt left = steer left (negative) - CORRECT AXIS
  gyroVal=Math.max(-1,Math.min(1,e.gamma/28));
}

let tBase=null;
document.addEventListener('touchstart',e=>{tBase=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchmove',e=>{
  if(!gyroAvail&&tBase!==null) gyroVal=Math.max(-1,Math.min(1,(e.touches[0].clientX-tBase)/(innerWidth*0.28)));
},{passive:true});
document.addEventListener('touchend',()=>{if(!gyroAvail)gyroVal=0;});

function nearIdx(x,z){
  let best=Infinity,bi=st.ni;
  for(let o=0;o<N;o++){
    const i=(st.ni+o)%N,p=TP[i];
    const d=(x-p.x)**2+(z-p.z)**2;
    if(d<best){best=d;bi=i;}
    if(o>20&&d>best*4) break;
  }
  return{idx:bi,dist:Math.sqrt(best)};
}

function resetGame(){
  const s=TP[0],s1=TP[1];
  st.x=s.x; st.z=s.z; st.angle=Math.atan2(s1.z-s.z,s1.x-s.x);
  st.speed=0;st.steer=0;st.score=0;st.laps=0;st.ni=0;st.gp=new Set();st.flash=0;
  gateGroup.children.forEach(g=>{
    g.userData.passed=false;
    g.material.color.setHex(0x00FFAA);
    g.material.emissive.setHex(0x00FF88);
    g.material.emissiveIntensity=0.5;
  });
  document.getElementById('spd').textContent='0';
  document.getElementById('sc').textContent='0';
  document.getElementById('lp').textContent='0/3';
  renderer.setClearColor(0x87CEEB);
}

function update(){
  if(!st.running) return;
  st.speed+=(MAX_SPD-st.speed)*ACCEL; st.speed*=FRIC;
  let si=gyroVal;
  if(!gyroAvail){
    if(keys['ArrowLeft']||keys['a']||keys['A']) si=-1;
    if(keys['ArrowRight']||keys['d']||keys['D']) si=1;
  }
  si=Math.max(-1,Math.min(1,si));
  st.steer+=(si-st.steer)*0.22;
  st.angle+=st.steer*TURN*(st.speed/MAX_SPD+0.35);
  st.x+=Math.cos(st.angle)*st.speed;
  st.z+=Math.sin(st.angle)*st.speed;
  const{idx,dist}=nearIdx(st.x,st.z); st.ni=idx;
  if(dist>RW*1.05){
    const tp=TP[idx],dx=st.x-tp.x,dz=st.z-tp.z,len=Math.hypot(dx,dz)||1;
    st.x=tp.x+dx/len*RW*0.82; st.z=tp.z+dz/len*RW*0.82;
    st.speed*=0.4; st.flash=12;
  }
  const now=performance.now();
  gateGroup.children.forEach(gate=>{
    if(gate.userData.passed) return;
    const gp=TP[gate.userData.idx];
    if(Math.hypot(st.x-gp.x,st.z-gp.z)<RW+0.5){
      gate.userData.passed=true;
      gate.material.color.setHex(0x888888);
      gate.material.emissiveIntensity=0;
      st.gp.add(gate.userData.idx); st.score+=10;
      if(st.gp.size>=GI.length){
        st.laps++; st.gp.clear(); st.score+=100;
        gateGroup.children.forEach(g=>{
          g.userData.passed=false;
          g.material.color.setHex(0x00FFAA);
          g.material.emissive.setHex(0x00FF88);
          g.material.emissiveIntensity=0.5;
        });
        if(st.laps>=3){endGame();return;}
      }
    }
    gate.material.emissiveIntensity=0.28+Math.sin(now*0.003+gate.userData.idx*0.8)*0.22;
    gate.position.y=TP[gate.userData.idx].y+1.0+Math.sin(now*0.002+gate.userData.idx)*0.15;
  });
  car3d.position.set(st.x,SLAB_Y+0.62,st.z);
  car3d.rotation.y=-st.angle+Math.PI;
  car3d.rotation.z=st.steer*0.15;
  const CD=9,CH=4.5;
  camera.position.x+=(st.x-Math.cos(st.angle)*CD-camera.position.x)*0.11;
  camera.position.y+=(SLAB_Y+CH-camera.position.y)*0.11;
  camera.position.z+=(st.z-Math.sin(st.angle)*CD-camera.position.z)*0.11;
  camera.lookAt(st.x,SLAB_Y+0.8,st.z);
  if(st.flash>0){renderer.setClearColor(st.flash%2===0?0xFF6600:0x87CEEB);st.flash--;}
  else renderer.setClearColor(0x87CEEB);
  document.getElementById('spd').textContent=Math.round(st.speed*400);
  document.getElementById('sc').textContent=st.score;
  document.getElementById('lp').textContent=st.laps+'/3';
  document.getElementById('gth').style.left=((si+1)/2*100)+'%';
}

function endGame(){
  st.running=false;
  document.getElementById('rb').style.display='none';
  const ov=document.getElementById('overlay');
  ov.innerHTML='<h1 style="color:#FFD700">FINISH!</h1><p style="color:#fff;font-size:14px;letter-spacing:2px;line-height:2.2;text-shadow:1px 1px 0 #000">SCORE: '+st.score+'<br>LAPS: '+st.laps+'/3</p><button class="bb" onclick="location.reload()">&#9658; PLAY AGAIN</button>';
  ov.style.display='flex';
}

function loop(){
  requestAnimationFrame(loop); update(); renderer.render(scene,camera);
}

function requestGyro(){
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission().then(r=>{if(r==='granted')window.addEventListener('deviceorientation',onOri);}).catch(()=>{});
  } else {
    window.addEventListener('deviceorientation',onOri);
  }
}

buildWorld(); loop();

document.getElementById('sb').addEventListener('click',()=>{
  requestGyro();
  buildWorld(); resetGame();
  document.getElementById('overlay').style.display='none';
  document.getElementById('rb').style.display='block';
  st.running=true;
});
document.getElementById('rb').addEventListener('click',()=>{
  requestGyro();
  buildWorld(); resetGame();
  st.running=true;
});
</script>
</body>
</html>
