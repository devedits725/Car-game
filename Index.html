<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DRIFT.EXE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden; touch-action: none;
  }
  #game-wrapper { position: relative; width: 100vw; height: 100vh; }
  canvas { display: block; width: 100%; height: 100%; }
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 12px 16px;
    display: flex; justify-content: space-between; align-items: flex-start;
    pointer-events: none; z-index: 10;
  }
  .hud-box {
    background: rgba(0,0,0,0.75);
    border: 2px solid #0ff;
    padding: 8px 14px;
    color: #0ff;
    font-size: clamp(7px, 2vw, 11px);
    line-height: 1.9;
    text-shadow: 0 0 8px #0ff;
    box-shadow: 0 0 12px #0ff4, inset 0 0 10px #0ff1;
  }
  .hud-box span { color: #ff0; text-shadow: 0 0 8px #ff0; }
  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.9);
    z-index: 20; gap: 20px; text-align: center; padding: 20px;
  }
  #overlay h1 {
    font-size: clamp(22px, 6vw, 52px);
    color: #0ff;
    text-shadow: 0 0 20px #0ff, 0 0 60px #0ff6;
    letter-spacing: 6px;
    animation: pulse 1.5s ease-in-out infinite;
  }
  .sub {
    color: #ff0; font-size: clamp(6px, 1.8vw, 10px);
    text-shadow: 0 0 10px #ff0; line-height: 2.4;
  }
  #start-btn {
    background: transparent; border: 3px solid #0f0;
    color: #0f0; font-family: 'Press Start 2P', monospace;
    font-size: clamp(8px, 2.5vw, 14px);
    padding: 14px 28px; cursor: pointer;
    text-shadow: 0 0 10px #0f0;
    box-shadow: 0 0 20px #0f04;
    animation: blink 1s step-end infinite;
    transition: all .15s;
  }
  #start-btn:hover, #start-btn:active {
    background: #0f03; transform: scale(1.06);
  }
  #gyro-status { font-size: clamp(6px, 1.5vw, 9px); padding: 6px 12px; }
  #gyro-status.ok  { color: #0f0; border-color: #0f0; text-shadow: 0 0 8px #0f0; }
  #gyro-status.warn { color: #f80; border-color: #f80; text-shadow: 0 0 8px #f80; }
  #speedbar-wrap {
    position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
    width: min(280px, 78vw); z-index: 10; pointer-events: none;
  }
  #speedbar-label {
    color: #0ff; font-size: clamp(6px, 1.5vw, 9px);
    text-align: center; margin-bottom: 4px; text-shadow: 0 0 8px #0ff;
  }
  #speedbar-outer {
    width: 100%; height: 10px;
    border: 2px solid #0ff;
    box-shadow: 0 0 10px #0ff5;
    background: #0001; border-radius: 2px;
  }
  #speedbar-inner {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #0ff, #0f0);
    box-shadow: 0 0 10px #0f08;
    transition: width .08s;
    border-radius: 1px;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.55} }
  @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0} }
</style>
</head>
<body>
<div id="game-wrapper">
  <canvas id="c"></canvas>

  <div id="hud">
    <div class="hud-box">SCORE<br><span id="score-val">00000</span></div>
    <div class="hud-box">LAPS<br><span id="lap-val">0 / 3</span></div>
    <div class="hud-box">BEST<br><span id="best-val">--:--</span></div>
  </div>

  <div id="speedbar-wrap">
    <div id="speedbar-label">SPEED</div>
    <div id="speedbar-outer"><div id="speedbar-inner"></div></div>
  </div>

  <div id="overlay">
    <h1>DRIFT.EXE</h1>
    <div class="sub">
      ⚡ AUTO THROTTLE ON ⚡<br>
      TILT PHONE TO STEER<br>
      DESKTOP: ← → ARROW KEYS<br>
      COMPLETE 3 LAPS!
    </div>
    <div id="gyro-status" class="hud-box warn">GYRO: CHECKING…</div>
    <button id="start-btn" onclick="startGame()">[ TAP TO START ]</button>
  </div>
</div>

<script>
// ── Canvas ──────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = canvas.offsetWidth; H = canvas.height = canvas.offsetHeight; }
resize();
window.addEventListener('resize', resize);

// ── Track (oval center-line waypoints in world coords 0-1000 x 0-620) ──
const TRACK_WP = [];
const ROAD_HW  = 80;    // half-width
const N_WP     = 80;

function buildTrack() {
  TRACK_WP.length = 0;
  const cx = 500, cy = 310, rx = 340, ry = 210;
  for (let i = 0; i < N_WP; i++) {
    const a = (i / N_WP) * Math.PI * 2 - Math.PI / 2;
    TRACK_WP.push({ x: cx + Math.cos(a) * rx, y: cy + Math.sin(a) * ry });
  }
}
buildTrack();

// ── Camera ──────────────────────────────────────────────────────
const cam = { x: 500, y: 310, zoom: 1.15 };
function w2s(wx, wy) {
  return { x: (wx - cam.x) * cam.zoom + W / 2, y: (wy - cam.y) * cam.zoom + H / 2 };
}

// ── Car ─────────────────────────────────────────────────────────
const car = {
  x: 500, y: 100, angle: 0, speed: 0, steer: 0,
  maxSpeed: 5.2, accel: 0.065, friction: 0.975, turnSpeed: 0.044,
  trail: [], laps: 0, lastWP: 0, score: 0, bestLap: null, lapStart: 0
};

// ── Input ───────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => { keys[e.key] = true; });
window.addEventListener('keyup',   e => { keys[e.key] = false; });

let gyroAngle = 0, gyroAvail = false;

function onOrientation(e) {
  if (e.gamma === null) return;
  gyroAvail = true;
  gyroAngle = Math.max(-45, Math.min(45, e.gamma)) / 45;
  document.getElementById('gyro-status').textContent = 'GYRO: ACTIVE ✓';
  document.getElementById('gyro-status').className   = 'hud-box ok';
}

function requestGyro() {
  if (typeof DeviceOrientationEvent !== 'undefined') {
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
      // iOS 13+ — must be called directly inside a user gesture (tap)
      DeviceOrientationEvent.requestPermission()
        .then(r => {
          if (r === 'granted') {
            window.addEventListener('deviceorientation', onOrientation);
          } else {
            document.getElementById('gyro-status').textContent = 'GYRO: DENIED — USE ← → KEYS';
            document.getElementById('gyro-status').className   = 'hud-box warn';
          }
        })
        .catch(() => {
          document.getElementById('gyro-status').textContent = 'GYRO: USE ← → KEYS';
          document.getElementById('gyro-status').className   = 'hud-box warn';
        });
    } else {
      // Android / desktop — no permission needed
      window.addEventListener('deviceorientation', onOrientation);
    }
  }
  setTimeout(() => {
    if (!gyroAvail) {
      document.getElementById('gyro-status').textContent = 'GYRO: USE ← → KEYS';
      document.getElementById('gyro-status').className   = 'hud-box warn';
    }
  }, 1800);
}
// requestGyro() is called inside startGame() which is triggered by a button tap

// ── Nearest WP ──────────────────────────────────────────────────
function nearestWP() {
  let bi = 0, bd = Infinity;
  TRACK_WP.forEach((wp, i) => {
    const d = Math.hypot(car.x - wp.x, car.y - wp.y);
    if (d < bd) { bd = d; bi = i; }
  });
  return bi;
}

function distToTrack() {
  let best = Infinity;
  for (let i = 0; i < N_WP; i++) {
    const a = TRACK_WP[i], b = TRACK_WP[(i + 1) % N_WP];
    const dx = b.x - a.x, dy = b.y - a.y, len2 = dx*dx + dy*dy;
    const t  = Math.max(0, Math.min(1, ((car.x-a.x)*dx + (car.y-a.y)*dy) / len2));
    const d  = Math.hypot(car.x - (a.x + t*dx), car.y - (a.y + t*dy));
    if (d < best) best = d;
  }
  return best;
}

// ── Particles ───────────────────────────────────────────────────
let particles = [];
function spawnDrift(x, y) {
  for (let i = 0; i < 2; i++) {
    particles.push({
      x, y,
      vx: (Math.random()-.5)*1.2, vy: (Math.random()-.5)*1.2,
      life: 1, r: Math.random()*3+1,
      col: Math.random() > .5 ? '#0ff' : '#f0f'
    });
  }
}

// ── Stars ───────────────────────────────────────────────────────
const stars = Array.from({length: 140}, () => ({
  x: Math.random()*1000, y: Math.random()*620,
  r: Math.random()*1.4+.3, b: Math.random()
}));

// ── Game state ──────────────────────────────────────────────────
let gameRunning = false, lastTime = 0;

function startGame() {
  // iOS REQUIRES requestPermission to be the very first synchronous call
  // inside a user-gesture handler — nothing async can precede it
  requestGyro();
  document.getElementById('overlay').style.display = 'none';
  Object.assign(car, { x:500, y:100, angle:0, speed:0, steer:0,
    trail:[], laps:0, lastWP:0, score:0, bestLap:null, lapStart: performance.now() });
  particles = [];
  document.getElementById('score-val').textContent = '00000';
  document.getElementById('lap-val').textContent   = '0 / 3';
  document.getElementById('best-val').textContent  = '--:--';
  gameRunning = true;
  lastTime = performance.now();
  requestAnimationFrame(loop);
}

function endGame() {
  gameRunning = false;
  const ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  ov.innerHTML = `
    <h1 style="font-size:clamp(18px,5vw,42px)">FINISH!</h1>
    <div class="sub">SCORE: ${car.score}<br>BEST LAP: ${car.bestLap ? car.bestLap+'s' : 'N/A'}</div>
    <button id="start-btn" style="animation:blink 1s step-end infinite;cursor:pointer;
      border:3px solid #0f0;color:#0f0;font-family:'Press Start 2P',monospace;
      font-size:clamp(8px,2.5vw,14px);padding:14px 28px;background:transparent;
      text-shadow:0 0 10px #0f0" onclick="location.reload()">[ RETRY ]</button>`;
}

// ── Draw helpers ────────────────────────────────────────────────
function drawBG() {
  ctx.fillStyle = '#060610'; ctx.fillRect(0,0,W,H);
  stars.forEach(st => {
    const s = w2s(st.x, st.y);
    if (s.x < -5 || s.y < -5 || s.x > W+5 || s.y > H+5) return;
    ctx.save();
    ctx.globalAlpha = 0.25 + st.b*.55;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.x, s.y, st.r, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

function trackPath(offsetPx) {
  ctx.beginPath();
  for (let i = 0; i <= N_WP; i++) {
    const a = TRACK_WP[i % N_WP], b = TRACK_WP[(i+1) % N_WP];
    const dx = b.x-a.x, dy = b.y-a.y, len = Math.hypot(dx,dy)||1;
    const nx = -dy/len*offsetPx, ny = dx/len*offsetPx;
    const s = w2s(a.x+nx, a.y+ny);
    i===0 ? ctx.moveTo(s.x,s.y) : ctx.lineTo(s.x,s.y);
  }
  ctx.closePath();
}

function drawTrack() {
  // Road shadow/glow
  ctx.save();
  ctx.strokeStyle = '#0f03';
  ctx.lineWidth = (ROAD_HW*2+40)*cam.zoom;
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  ctx.beginPath();
  for (let i=0;i<=N_WP;i++){
    const wp=TRACK_WP[i%N_WP], s=w2s(wp.x,wp.y);
    i===0?ctx.moveTo(s.x,s.y):ctx.lineTo(s.x,s.y);
  }
  ctx.closePath(); ctx.stroke(); ctx.restore();

  // Road fill
  ctx.save();
  ctx.strokeStyle = '#141428';
  ctx.lineWidth = ROAD_HW*2*cam.zoom;
  ctx.lineJoin='round'; ctx.lineCap='round';
  ctx.beginPath();
  for (let i=0;i<=N_WP;i++){
    const wp=TRACK_WP[i%N_WP], s=w2s(wp.x,wp.y);
    i===0?ctx.moveTo(s.x,s.y):ctx.lineTo(s.x,s.y);
  }
  ctx.closePath(); ctx.stroke(); ctx.restore();

  // Edge lines
  [-1, 1].forEach(side => {
    ctx.save();
    ctx.strokeStyle = '#003cff'; ctx.shadowColor='#003cff'; ctx.shadowBlur=14;
    ctx.lineWidth=4*cam.zoom; ctx.lineJoin='round';
    trackPath(side * ROAD_HW);
    ctx.stroke(); ctx.restore();
  });

  // Centre dash
  ctx.save();
  ctx.strokeStyle='#ff0'; ctx.shadowColor='#ff0'; ctx.shadowBlur=8;
  ctx.lineWidth=2.5*cam.zoom; ctx.setLineDash([18*cam.zoom,18*cam.zoom]);
  ctx.lineJoin='round';
  ctx.beginPath();
  for (let i=0;i<=N_WP;i++){
    const wp=TRACK_WP[i%N_WP], s=w2s(wp.x,wp.y);
    i===0?ctx.moveTo(s.x,s.y):ctx.lineTo(s.x,s.y);
  }
  ctx.closePath(); ctx.stroke(); ctx.restore();

  // Start/finish stripe
  const wp0=TRACK_WP[0], wp1=TRACK_WP[1];
  const dx=wp1.x-wp0.x, dy=wp1.y-wp0.y, len=Math.hypot(dx,dy)||1;
  const nx=-dy/len*ROAD_HW, ny=dx/len*ROAD_HW;
  const sa=w2s(wp0.x+nx, wp0.y+ny), sb=w2s(wp0.x-nx, wp0.y-ny);
  ctx.save();
  ctx.strokeStyle='#fff'; ctx.shadowColor='#fff'; ctx.shadowBlur=16;
  ctx.lineWidth=7;
  ctx.beginPath(); ctx.moveTo(sa.x,sa.y); ctx.lineTo(sb.x,sb.y); ctx.stroke();
  ctx.restore();
}

function drawTrail() {
  if (car.trail.length < 2) return;
  ctx.save();
  for (let i=1;i<car.trail.length;i++) {
    const a=car.trail[i-1], b=car.trail[i];
    const sa=w2s(a.x,a.y), sb=w2s(b.x,b.y);
    const al = i/car.trail.length*0.35;
    ctx.strokeStyle=`rgba(0,255,255,${al})`; ctx.lineWidth=2.5*cam.zoom;
    ctx.beginPath(); ctx.moveTo(sa.x,sa.y); ctx.lineTo(sb.x,sb.y); ctx.stroke();
  }
  ctx.restore();
}

function drawParticles() {
  particles.forEach(p=>{
    const s=w2s(p.x,p.y);
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.shadowColor=p.col; ctx.shadowBlur=10; ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(s.x,s.y,p.r*cam.zoom,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

function drawCar() {
  const s  = w2s(car.x, car.y);
  const cw = 18*cam.zoom, ch=10*cam.zoom;
  ctx.save();
  ctx.translate(s.x,s.y); ctx.rotate(car.angle + Math.PI/2);
  // glow
  ctx.shadowColor='#0ff'; ctx.shadowBlur=28;
  // body
  ctx.fillStyle='#00e5ff';
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(-cw/2,-ch*1.8,cw,ch*3.2,4);
  else { ctx.rect(-cw/2,-ch*1.8,cw,ch*3.2); }
  ctx.fill();
  // windshield
  ctx.fillStyle='#002233'; ctx.shadowBlur=0;
  ctx.fillRect(-cw*.34,-ch*1.4,cw*.68,ch*1.0);
  // headlights
  ctx.fillStyle='#fff'; ctx.shadowColor='#ffe'; ctx.shadowBlur=12;
  ctx.fillRect(-cw*.42,-ch*1.75,cw*.22,ch*.38);
  ctx.fillRect( cw*.20,-ch*1.75,cw*.22,ch*.38);
  // taillights
  ctx.fillStyle='#f00'; ctx.shadowColor='#f00'; ctx.shadowBlur=10;
  ctx.fillRect(-cw*.42, ch*1.38,cw*.22,ch*.32);
  ctx.fillRect( cw*.20, ch*1.38,cw*.22,ch*.32);
  ctx.restore();
}

// ── Update ──────────────────────────────────────────────────────
function checkLap() {
  const idx = nearestWP();
  if (car.lastWP > N_WP*.75 && idx < N_WP*.1) {
    const now = performance.now();
    if (car.laps > 0) {
      const lt = ((now - car.lapStart)/1000).toFixed(2);
      if (!car.bestLap || parseFloat(lt) < parseFloat(car.bestLap)) {
        car.bestLap = lt;
        document.getElementById('best-val').textContent = lt+'s';
      }
    }
    car.laps++; car.lapStart = performance.now();
    car.score += 500;
    document.getElementById('lap-val').textContent = car.laps+' / 3';
    if (car.laps >= 3) endGame();
  }
  car.lastWP = idx;
}

function update(dt) {
  dt = Math.min(dt, 50);

  // Auto throttle — slow down off-track
  const onTrack    = distToTrack() < ROAD_HW * .95;
  const targetSpd  = onTrack ? car.maxSpeed : car.maxSpeed * .38;
  car.speed += (targetSpd - car.speed) * car.accel;
  car.speed *= car.friction;

  // Steer from gyro or keys
  let si = 0;
  if (gyroAvail) {
    si = gyroAngle;
  } else {
    if (keys['ArrowLeft']  || keys['a'] || keys['A']) si = -1;
    if (keys['ArrowRight'] || keys['d'] || keys['D']) si =  1;
  }
  car.steer = si;
  car.angle += si * car.turnSpeed * (car.speed/car.maxSpeed + .28);

  car.x += Math.cos(car.angle)*car.speed;
  car.y += Math.sin(car.angle)*car.speed;

  // Drift sparks
  if (Math.abs(si)>.5 && car.speed>1.8)
    spawnDrift(car.x - Math.cos(car.angle)*12, car.y - Math.sin(car.angle)*12);

  // Trail
  car.trail.push({x:car.x,y:car.y});
  if (car.trail.length>70) car.trail.shift();

  // Particles
  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.life-=.022; });
  particles = particles.filter(p=>p.life>0);

  // Score
  car.score += Math.floor(car.speed*.4);
  document.getElementById('score-val').textContent = String(car.score).padStart(5,'0');

  // Speed bar
  const pct = (car.speed/car.maxSpeed)*100;
  document.getElementById('speedbar-inner').style.width = pct+'%';
  document.getElementById('speedbar-inner').style.background =
    pct>80 ? 'linear-gradient(90deg,#0ff,#f00)'
           : pct>50 ? 'linear-gradient(90deg,#0ff,#ff0)'
           : 'linear-gradient(90deg,#0ff,#0f0)';

  // Camera
  cam.x += (car.x - cam.x)*.09;
  cam.y += (car.y - cam.y)*.09;

  checkLap();
}

function loop(ts) {
  if (!gameRunning) return;
  const dt = ts - lastTime; lastTime = ts;
  update(dt);
  drawBG();
  drawTrail();
  drawTrack();
  drawParticles();
  drawCar();
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
